name: PropAI CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Backend - Install and Check
      run: |
        cd backend
        npm install
        # Add tests here when available
        # npm test

    - name: Frontend - Install and Build
      run: |
        cd frontend
        npm install
        npm run build

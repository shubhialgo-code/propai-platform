name: PropAI CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    - name: Backend - Install and Check
      run: |
        cd backend
        npm install
        # npm test

    - name: Frontend - Install, Lint and Build
      run: |
        cd frontend
        npm install
        npm run lint
        npm run build

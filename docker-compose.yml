services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
    volumes:
      - ./backend/dev.db:/app/dev.db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: ../backend/Dockerfile # Next.js would usually have its own, but we can reuse a generic node one for simple dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: always
